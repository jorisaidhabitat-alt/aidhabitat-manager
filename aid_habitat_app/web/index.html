<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Assistant ergothérapie aid'Habitat — relevés de visite à domicile, dossiers ANAH, préconisations.">
  <meta name="theme-color" content="#907CA1">

  <!-- iOS / iPadOS PWA meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="aid'Habitat">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>aid'Habitat</title>
  <link rel="manifest" href="manifest.json">

  <!--
    pdfjs-dist : nécessaire au package `pdfx` côté web pour
    rasteriser les PDF (`PdfDocument.openData`). Sans ce script, on
    obtient `Exception: Pdfjs library not loaded` à l'ouverture du
    moindre PDF.

    Version 2.13.216 — proven stable avec `pdfx ^2.6.x` (cf. la doc
    officielle du package). Le `crossorigin="anonymous"` est requis
    parce que le PWA tourne en `Cross-Origin-Embedder-Policy:
    credentialless` (cf. vercel.json) — sans ça le browser refuse
    d'exécuter le script.

    Service Worker Flutter cache le script après la 1re visite, donc
    pas de roundtrip réseau ensuite : la preview s'ouvre instantanément.
  -->
  <script
    src="https://unpkg.com/pdfjs-dist@2.13.216/build/pdf.min.js"
    crossorigin="anonymous"></script>
  <script>
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://unpkg.com/pdfjs-dist@2.13.216/build/pdf.worker.min.js';
    } else {
      // ignore: avoid_print
      console.warn('[pdfjs] pdf.min.js non chargé — vérifiez la connectivité ou les CSP/COEP du serveur.');
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
