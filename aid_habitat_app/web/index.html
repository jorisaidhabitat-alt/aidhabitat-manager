<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="App'Ergo — relevés de visite à domicile, dossiers ANAH, préconisations.">
  <meta name="theme-color" content="#907CA1">

  <!-- iOS / iPadOS PWA meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="App'Ergo">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>App'Ergo</title>
  <link rel="manifest" href="manifest.json">

  <!--
    pdfjs-dist : nécessaire au package `pdfx` côté web pour
    rasteriser les PDF (`PdfDocument.openData`). Sans ce script, on
    obtient `Exception: Pdfjs library not loaded` à l'ouverture du
    moindre PDF.

    Version 2.13.216 — proven stable avec `pdfx ^2.6.x` (cf. la doc
    officielle du package).

    Bundlé localement dans `web/pdfjs/` (au lieu d'un CDN unpkg.com)
    depuis 2026-05-07 pour garantir le fonctionnement 100 % offline :
    le service worker Flutter cache automatiquement les assets
    same-origin, donc PDF.js reste dispo même si l'iPad part offline
    avant le 1er load PDF (avant ce changement, le browser cache HTTP
    pouvait évincer le script CDN et casser la preview offline).
    Voir `web/pdfjs/pdf.min.js` (~230 Ko) + `pdf.worker.min.js`
    (~1 Mo). Mise à jour : remplacer les deux fichiers manuellement
    en récupérant la version voulue depuis https://unpkg.com/pdfjs-dist/.
  -->
  <script src="pdfjs/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdfjs/pdf.worker.min.js';
    } else {
      console.warn('[pdfjs] pdf.min.js non chargé — vérifier que web/pdfjs/ est bien servi.');
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
