# ---------------------------------------------------------------------------
# Configuration nginx pour le frontend Flutter web (aid-habitat-app).
#
# Reproduit les headers que `aid_habitat_app/vercel.json` posait :
#   - COOP/COEP pour permettre le SharedArrayBuffer de sqflite WASM
#   - SPA fallback vers /index.html
#   - Cache HTTP : assets immuables = long cache, index.html = no-cache
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression — économie ~70 % sur le main.dart.js (~5 MB → ~1.5 MB).
    # Crucial pour réduire la bande passante (cf. quota Vercel dépassé sur
    # le Fast Origin Transfer parce que pas de gzip côté Vercel CDN).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/xml
        image/svg+xml;

    # ------------------------------------------------------------------
    # Headers COOP/COEP — requis pour SharedArrayBuffer, lui-même requis
    # par sqflite_common_ffi_web (driver SQLite WASM côté PWA iPad).
    # Sans ces headers : sqflite échoue à boot → DB SQLite locale non
    # initialisée → l'app marche en mode "online-only" sans cache.
    # ------------------------------------------------------------------
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # Variante stricte pour le service worker SQLite (cf. vercel.json
    # historique : require-corp uniquement sur ce fichier).
    location = /sqflite_sw.js {
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # Cache HTTP par type de ressource
    # ------------------------------------------------------------------
    # index.html : jamais cacher → garantit qu'au prochain deploy
    # tous les utilisateurs récupèrent la nouvelle version qui pointe
    # vers les nouveaux chunks hashés.
    location = / {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        try_files $uri =404;
    }

    # Bundle Flutter web : nom hashé (ex. main.dart.js?v=hash) → immuable
    # côté contenu. On peut cacher longtemps (1 an) sans risque de stale —
    # Flutter regénère un nouveau bundle avec un autre hash à chaque build.
    location ~* \.(js|wasm|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # SPA fallback : toutes les routes Flutter non-matchées → /index.html
    # Sans ça, naviguer vers /dashboard ou /dossier/X au refresh renvoie
    # un 404 nginx au lieu de laisser Flutter Router gérer.
    # ------------------------------------------------------------------
    location / {
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        try_files $uri $uri/ /index.html;
    }
}
