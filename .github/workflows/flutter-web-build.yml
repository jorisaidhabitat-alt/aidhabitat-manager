name: Build Flutter Web

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API URL baked into the Flutter web bundle"
        required: false
        default: "https://apps-aidhabitat-api-staging.z5avx1.easypanel.host"
      upload_artifact:
        description: "Upload build/web as a short-lived artifact"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: flutter-web-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build PWA bundle
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: aid_habitat_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.4"
          channel: stable
          cache: false

      - name: Build Flutter web
        env:
          AIDHABITAT_API_BASE_URL: ${{ inputs.api_base_url }}
        run: |
          chmod +x ./tool/build_web.sh
          ./tool/build_web.sh

      - name: Upload PWA artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: aidhabitat-pwa-web
          path: aid_habitat_app/build/web
          if-no-files-found: error
          retention-days: 3
          compression-level: 6
