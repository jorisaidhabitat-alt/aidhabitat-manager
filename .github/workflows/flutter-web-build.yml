name: Build Flutter Web

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API URL baked into the Flutter web bundle"
        required: false
        default: "https://apps-aidhabitat-api-staging.z5avx1.easypanel.host"
      upload_artifact:
        description: "Upload build/web as a short-lived artifact"
        required: false
        type: boolean
        default: true
      publish_image:
        description: "Publish a prebuilt nginx image to GitHub Container Registry"
        required: false
        type: boolean
        default: false
      make_image_public:
        description: "Try to make the GHCR image public after publishing"
        required: false
        type: boolean
        default: true
      image_tag:
        description: "Container image tag used when publish_image is enabled"
        required: false
        default: "staging"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: flutter-web-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build PWA bundle
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: aid_habitat_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.4"
          channel: stable
          cache: false

      - name: Build Flutter web
        env:
          AIDHABITAT_API_BASE_URL: ${{ inputs.api_base_url }}
        run: |
          chmod +x ./tool/build_web.sh
          ./tool/build_web.sh

      - name: Publish prebuilt nginx image
        if: ${{ inputs.publish_image }}
        env:
          GHCR_TOKEN: ${{ github.token }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/aidhabitat-web
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -f Dockerfile.web \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            -t "$IMAGE_NAME:${{ github.sha }}" \
            .
          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker push "$IMAGE_NAME:${{ github.sha }}"

      - name: Make GHCR image public
        if: ${{ inputs.publish_image && inputs.make_image_public }}
        continue-on-error: true
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          response_file="$(mktemp)"
          status_code="$(
            curl -sS -L \
              -o "$response_file" \
              -w "%{http_code}" \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GHCR_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/user/packages/container/aidhabitat-web/visibility \
              -d '{"visibility":"public"}'
          )"
          cat "$response_file"
          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Unable to make GHCR package public automatically (HTTP $status_code)." >&2
            exit 1
          fi

      - name: Upload PWA artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: aidhabitat-pwa-web
          path: aid_habitat_app/build/web
          if-no-files-found: error
          retention-days: 3
          compression-level: 6
