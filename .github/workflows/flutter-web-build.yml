name: Build Flutter Web

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API URL baked into the Flutter web bundle"
        required: false
        default: "https://api.aidhabitat.fr"
      upload_artifact:
        description: "Upload build/web as a short-lived artifact"
        required: false
        type: boolean
        default: true
      publish_image:
        description: "Publish a prebuilt nginx image to GitHub Container Registry"
        required: false
        type: boolean
        default: false
      image_tag:
        description: "Container image tag used when publish_image is enabled"
        required: false
        default: "staging"
      deploy_staging:
        description: "Trigger Easypanel web staging after publishing the image"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: flutter-web-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build PWA bundle
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: aid_habitat_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run PDF smoke test
        working-directory: .
        run: |
          npm ci --no-audit --no-fund
          npm run test:pdf

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.4"
          channel: stable
          cache: false

      - name: Build Flutter web
        env:
          AIDHABITAT_API_BASE_URL: ${{ inputs.api_base_url }}
        run: |
          chmod +x ./tool/build_web.sh
          ./tool/build_web.sh

      - name: Publish prebuilt nginx image
        if: ${{ inputs.publish_image }}
        env:
          GHCR_TOKEN: ${{ github.token }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/aidhabitat-web
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -f Dockerfile.web \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            -t "$IMAGE_NAME:${{ github.sha }}" \
            .
          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker push "$IMAGE_NAME:${{ github.sha }}"

      - name: Trigger Easypanel web staging
        if: ${{ inputs.publish_image && inputs.deploy_staging }}
        working-directory: .
        env:
          EASYPANEL_DEPLOY_URL: ${{ secrets.EASYPANEL_WEB_STAGING_DEPLOY_URL }}
        run: |
          if [ -z "$EASYPANEL_DEPLOY_URL" ]; then
            echo "Missing EASYPANEL_WEB_STAGING_DEPLOY_URL secret." >&2
            exit 1
          fi
          curl --fail-with-body --show-error --silent \
            --request POST \
            "$EASYPANEL_DEPLOY_URL"

      - name: Upload PWA artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: aidhabitat-pwa-web
          path: aid_habitat_app/build/web
          if-no-files-found: error
          retention-days: 3
          compression-level: 6
